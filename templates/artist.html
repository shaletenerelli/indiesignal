<!DOCTYPE html>
<html>
<head>
    <title>{{ artist_name }} — IndieSignal</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h1>IndieSignal</h1>
    <a href="/" class="back-link">← Back to search</a>
    <h2>{{ artist_name }}</h2>
    <h3>Top Albums</h3>
    {% if releases %}
        {% for release in releases %}
            <div class="artist-card">
                <p><span class="artist-name">{{ release.name }}</span></p>
                <p>Playcount: {{ release.playcount }}</p>
            </div>
        {% endfor %}
    {% else %}
        <p>No albums found.</p>
    {% endif %}
</body>
</html>
